<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OP: VANGUARD // ACADEMY S&C SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #e5e5e5;
        }

        .tactical-border {
            border: 1px solid #1f2937;
            position: relative;
        }

        .tactical-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 10px; height: 10px;
            border-top: 2px solid #06b6d4;
            border-left: 2px solid #06b6d4;
        }

        .tactical-border::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 10px; height: 10px;
            border-bottom: 2px solid #06b6d4;
            border-right: 2px solid #06b6d4;
        }

        .toggle-btn {
            background-color: #111827;
            color: #6b7280;
            border: 1px solid #374151;
            transition: all 0.2s ease-in-out;
        }
        .toggle-btn:hover {
            color: #e5e5e5;
            border-color: #4b5563;
        }
        .toggle-btn.active {
            background-color: #06b6d4;
            color: #000000;
            border-color: #06b6d4;
            font-weight: bold;
        }

        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .protocol-header { color: #ffffff; font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 4px; margin-top: 12px; border-bottom: 1px solid #1f2937; padding-bottom: 2px; }
        .protocol-detail { color: #9ca3af; font-size: 0.85em; line-height: 1.5; display: block; margin-bottom: 2px; }
        .protocol-cue { color: #06b6d4; font-size: 0.75em; font-style: italic; display: block; margin-top: 6px; border-left: 2px solid #06b6d4; padding-left: 8px; font-weight: bold; }
        .alert-cue { color: #ef4444; font-size: 0.75em; font-style: italic; display: block; margin-top: 6px; border-left: 2px solid #ef4444; padding-left: 8px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 selection:bg-[#06b6d4] selection:text-black">

    <header class="max-w-7xl mx-auto mb-8">
        <div class="tactical-border p-6 bg-gray-900 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-gray-800 pb-4">
                <h1 class="text-3xl font-bold text-white tracking-tighter uppercase">
                    <i class="fas fa-project-diagram mr-2 text-[#06b6d4]"></i>Project Vanguard
                </h1>
                <span class="text-xs border border-[#06b6d4] text-[#06b6d4] px-2 py-1 rounded mt-2 md:mt-0 font-bold tracking-widest">YOUTH RUGBY S&C MATRIX</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <span class="text-xs text-gray-500 font-bold tracking-widest block mb-2">OPERATIVE BIOLOGY</span>
                    <div class="flex space-x-2">
                        <button id="btn-m" onclick="setGender('M')" class="toggle-btn active flex-1 py-2 text-sm uppercase">Male</button>
                        <button id="btn-f" onclick="setGender('F')" class="toggle-btn flex-1 py-2 text-sm uppercase">Female</button>
                    </div>
                </div>
                <div>
                    <span class="text-xs text-gray-500 font-bold tracking-widest block mb-2">TRAINING AGE (GYM)</span>
                    <div class="flex space-x-2">
                        <button id="btn-exp-1" onclick="setExp(1)" class="toggle-btn active flex-1 py-2 text-sm uppercase">1-2 Yrs (Armor)</button>
                        <button id="btn-exp-3" onclick="setExp(3)" class="toggle-btn flex-1 py-2 text-sm uppercase">3-4 Yrs (Power)</button>
                    </div>
                </div>
                <div>
                    <span class="text-xs text-gray-500 font-bold tracking-widest block mb-2">MACROCYCLE PHASE</span>
                    <div class="flex space-x-2">
                        <button id="btn-phase-in" onclick="setPhase('IN')" class="toggle-btn active flex-1 py-2 text-sm uppercase">In-Season</button>
                        <button id="btn-phase-off" onclick="setPhase('OFF')" class="toggle-btn flex-1 py-2 text-sm uppercase">Off-Season</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-4">
        <div class="tactical-border p-4 bg-gray-900">
            <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                <h2 class="text-white font-bold tracking-widest uppercase"><span class="blink text-[#06b6d4]">●</span> WEEKLY DEPLOYMENT</h2>
                <span id="dynamic-label" class="text-xs font-bold text-gray-400 uppercase">Calculating Matrix...</span>
            </div>
            
            <div class="grid gap-3" id="schedule-grid">
                </div>
        </div>
    </main>

    <script>
        let state = {
            gender: 'M', // M or F
            exp: 1,      // 1 (Foundation) or 3 (Advanced)
            phase: 'IN'  // IN or OFF
        };

        const domSchedule = document.getElementById('schedule-grid');
        const domLabel = document.getElementById('dynamic-label');

        function setGender(g) {
            state.gender = g;
            document.getElementById('btn-m').classList.toggle('active', g === 'M');
            document.getElementById('btn-f').classList.toggle('active', g === 'F');
            renderSchedule();
        }

        function setExp(e) {
            state.exp = e;
            document.getElementById('btn-exp-1').classList.toggle('active', e === 1);
            document.getElementById('btn-exp-3').classList.toggle('active', e === 3);
            renderSchedule();
        }

        function setPhase(p) {
            state.phase = p;
            document.getElementById('btn-phase-in').classList.toggle('active', p === 'IN');
            document.getElementById('btn-phase-off').classList.toggle('active', p === 'OFF');
            renderSchedule();
        }

        function getRepRange() {
            return state.exp === 1 ? "3 sets x 6-8 reps (Hypertrophy/Armor)" : "4 sets x 3-5 reps (Pure CNS/Power)";
        }

        function getBioCue() {
            if (state.gender === 'F') {
                return `<span class="alert-cue">BIO-CUE (FEMALE): Prioritize posterior chain. RDLs, Nordics, and Eccentric landing mechanics mandatory to counter ACL risk/Q-Angle.</span>`;
            } else {
                return `<span class="protocol-cue">BIO-CUE (MALE): Prioritize upper body structural armor. Heavy shrugs, neck isometrics, and upper back density to absorb tackle impact.</span>`;
            }
        }

        function renderSchedule() {
            const rRange = getRepRange();
            const bioCue = getBioCue();
            
            let html = ``;
            
            // MONDAY
            let monPitch = state.gender === 'M' ? 'Boys Skills & Rugby' : 'Light Technical Flow';
            let monGym = state.phase === 'OFF' ? 
                `<span class="protocol-header mt-0">HEAVY LOWER BODY LIFT</span><span class="protocol-detail">Squat/Hinge primary day. ${rRange}.</span>` : 
                `<span class="protocol-header mt-0">MICRO-DOSE LIFT (POST-SUNDAY)</span><span class="protocol-detail">Armor building only. 15 mins. Upper back, core stiffness.</span>`;
            
            html += createDayRow('MON', monPitch, monGym + bioCue, 'border-gray-700');

            // TUESDAY
            let tuePitch = state.gender === 'M' ? 'Boys Skills' : 'Girls Pitch Match Prep';
            let tueGym = state.phase === 'OFF' ? 
                `<span class="protocol-header mt-0">UPPER BODY ARMOR</span><span class="protocol-detail">Press/Pull supersets. ${rRange}.</span>` : 
                `<span class="protocol-header mt-0">PRE-MATCH NEURAL PRIMER</span><span class="protocol-detail">Alactic sprints. Medicine ball throws. Zero heavy barbell load.</span>`;
            
            html += createDayRow('TUE', tuePitch, tueGym, 'border-gray-700');

            // WEDNESDAY
            let wedText = state.phase === 'IN' ? 
                `<span class="protocol-header mt-0 text-[#06b6d4]">MATCH DAY</span><span class="protocol-detail">Maximum arousal. Redline execution.</span>` : 
                `<span class="protocol-header mt-0 text-gray-400">REST OR PICK-UP GAMES</span><span class="protocol-detail">Active recovery. Zone 2 field movement.</span>`;
            html += createDayRow('WED', 'Fixture / Pick-ups', wedText, state.phase === 'IN' ? 'border-[#06b6d4]' : 'border-gray-700');

            // THURSDAY
            let thuPitch = 'Gym & Recovery Protocol';
            let thuGym = state.phase === 'IN' ? 
                `<span class="protocol-header mt-0 text-red-400">POST-MATCH TRIAGE</span><span class="protocol-detail">Pool/Bike flush. Isometric holds (yields tendon relief without muscle damage). ZERO high-impact loading.</span>` : 
                `<span class="protocol-header mt-0">ALACTIC ENGINE BUILD</span><span class="protocol-detail">Overspeed Swings. 10s Work / 50s Rest. Lactic acid strictly prohibited.</span>`;
            html += createDayRow('THU', thuPitch, thuGym, 'border-gray-700');

            // FRIDAY
            let friPitch = 'High Contact / Gym / Speed';
            let friGym = state.phase === 'IN' ? 
                `<span class="protocol-header mt-0">SPEED & ARMOR MAXIMIZATION</span><span class="protocol-detail">48hrs post-match window. Heavy, low-volume lifting. ${rRange}.</span><span class="protocol-detail">Contact drills strictly monitored for fatigue.</span>` : 
                `<span class="protocol-header mt-0">MAXIMAL STRENGTH PHASE</span><span class="protocol-detail">Total body strength. Heavy contrast loading (Heavy lift immediately followed by unweighted jump).</span>`;
            html += createDayRow('FRI', friPitch, friGym + bioCue, 'border-gray-700');

            // SATURDAY
            html += createDayRow('SAT', 'Absolute Rest', `<span class="protocol-detail italic text-gray-500">Systemic reboot. No academy mandates.</span>`, 'border-gray-800');

            // SUNDAY
            let sunText = state.phase === 'IN' ? 
                `<span class="protocol-header mt-0">CLUB FIXTURE OR HIGH-END CAPACITY</span><span class="protocol-detail">Club match participation or high-intensity Alactic field session for non-selected players.</span>` : 
                `<span class="protocol-header mt-0">AEROBIC BASE (ZONE 2)</span><span class="protocol-detail">Long slow distance running, rowing, or rucking. HR < 140bpm.</span>`;
            html += createDayRow('SUN', 'Club / Extension', sunText, 'border-gray-700');

            domSchedule.innerHTML = html;
            
            // Update Label
            const gText = state.gender === 'M' ? 'Male' : 'Female';
            const eText = state.exp === 1 ? '1-2 Yrs (Armor)' : '3-4 Yrs (Power)';
            const pText = state.phase === 'IN' ? 'In-Season' : 'Off-Season';
            domLabel.innerText = `${gText} // ${eText} // ${pText}`;
        }

        function createDayRow(day, title, content, borderColor) {
            return `
            <div class="grid grid-cols-12 gap-4 bg-gray-950 p-4 border-l-4 ${borderColor}">
                <div class="col-span-2 md:col-span-1 font-bold text-gray-500 mt-1">${day}</div>
                <div class="col-span-10 md:col-span-3 font-bold text-white mt-1 uppercase">${title}</div>
                <div class="col-span-12 md:col-span-8 text-sm text-gray-300">
                    ${content}
                </div>
            </div>`;
        }

        // Initialize
        renderSchedule();
    </script>
</body>
</html>
